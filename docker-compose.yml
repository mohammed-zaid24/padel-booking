services:
  web:
    build: .
    container_name: wd1_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    # command: >
    #   bash -lc "a2enmod rewrite && docker-php-ext-install pdo pdo_mysql &&apache2-foreground"


  db:
    image: mysql:8.0
    container_name: wd1_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: padel_booking
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wd1_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  dbdata:
